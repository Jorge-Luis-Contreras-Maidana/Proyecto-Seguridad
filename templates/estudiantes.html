<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de Estudiantes</title>
    <style>
        table { width: 80%; border-collapse: collapse; margin: 20px auto; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

    <h1 style="text-align: center;">Estudiantes Registrados</h1>

    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Carrera</th>
                <th>Email</th>
            </tr>
        </thead>
        <tbody>
            {% for e in estudiantes %}
            <tr>
                <td>{{ e.nombre }}</td>
                <td>{{ e.apellido }}</td>
                <td>{{ e.carrera }}</td>
                <td>{{ e.email if e.email else 'No registrado' }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</body>
</html>
