{% extends "index.html" %}

{% block content %}
    <h1>Modificar Docente</h1>
    
    <form action="{{ url_for('modificar_docente', id=docente.id_docente) }}" method="post" style="max-width: 400px; margin: auto;">
        
        <label>Nombre:</label><br>
        <input type="text" name="nombre" value="{{ docente.nombre }}" required style="width: 100%; padding: 8px; margin-bottom: 10px;"><br>
        
        <label>Apellido:</label><br>
        <input type="text" name="apellido" value="{{ docente.apellido }}" required style="width: 100%; padding: 8px; margin-bottom: 10px;"><br>
        
        <label>Especialidad:</label><br>
        <input type="text" name="especialidad" value="{{ docente.especialidad }}" required style="width: 100%; padding: 8px; margin-bottom: 10px;"><br>
        
        <label>Email:</label><br>
        <input type="email" name="email" value="{{ docente.email }}" required style="width: 100%; padding: 8px; margin-bottom: 20px;"><br>
        
        <button type="submit" style="padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer;">Guardar Cambios</button>
        <a href="/docentes" style="padding: 10px 20px; background: #6c757d; color: white; text-decoration: none;">Cancelar</a>
    
    </form>
{% endblock %}
