{% extends "base.html" %}

{% block content %}
<div style="max-width: 500px; margin: 40px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
    
    <h2 style="text-align: center; color: #1e3c72; margin-bottom: 25px;">
        {% if usuario %} Editar Usuario: {{ usuario.username }} {% else %} Registrar Nuevo Usuario {% endif %}
    </h2>

    <form method="POST" action="">
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #555;">Nombre de Usuario</label>
            <input type="text" name="username" value="{{ usuario.username if usuario else '' }}" 
                   style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;" required 
                   {% if usuario %}readonly style="background-color: #f8f9fa;"{% endif %}>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #555;">Correo Electrónico</label>
            <input type="email" name="email" value="{{ usuario.email if usuario else '' }}" 
                   style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;" required>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #555;">
                Contraseña {% if usuario %}<small>(Dejar en blanco para no cambiar)</small>{% endif %}
            </label>
            <input type="password" name="password" 
                   style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;" 
                   {% if not usuario %}required{% endif %}>
        </div>

        <div style="margin-bottom: 25px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #555;">Rol del Sistema</label>
            <select name="rol" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: white;">
                <option value="estudiante" {% if usuario and usuario.rol == 'supervisor' %}selected{% endif %}>Supervisor (Consulta de notas)</option>
                <option value="docente" {% if usuario and usuario.rol == 'operador' %}selected{% endif %}>Operador (Gestión académica)</option>
                <option value="auditor" {% if usuario and usuario.rol == 'auditor' %}selected{% endif %}>Auditor (Supervisión de Logs)</option>
                <option value="admin" {% if usuario and usuario.rol == 'admin' %}selected{% endif %}>Administrador (Control total)</option>
            </select>
        </div>

        <div style="display: flex; gap: 10px;">
            <button type="submit" style="flex: 2; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
                {% if usuario %}Actualizar Datos{% else %}Guardar Usuario{% endif %}
            </button>
            <a href="{{ url_for('gestionar_usuarios') }}" style="flex: 1; padding: 12px; background: #6c757d; color: white; text-decoration: none; border-radius: 8px; text-align: center; font-size: 0.9em;">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
