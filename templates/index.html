<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Universitario</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        /* Top Navigation */
        .top-nav { background-color: #333; padding: 15px; display: flex; justify-content: center; gap: 20px; }
        .top-nav a { color: white; text-decoration: none; padding: 10px 15px; font-weight: bold; }
        .top-nav a:hover { background-color: #555; }
        /* Body Content */
        .main-content { padding: 40px; text-align: center; min-height: 300px; }
        /* Footer */
        .footer { background-color: #f4f4f4; text-align: center; padding: 10px; border-top: 1px solid #ccc; }
        /* Tablas */
        table { width: 80%; border-collapse: collapse; margin: 20px auto; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

    <header class="top-nav">
        <a href="/">Inicio</a>
        <a href="/estudiantes">Estudiantes</a>
        <a href="/materias">Materias</a>
        <a href="/docentes">Docentes</a>
        <a href="/aulas">Aulas</a>
        <a href="/inscripciones">Inscripciones</a>
    </header>

    <main class="main-content">
        {% block content %}
        <h1>Bienvenido al Sistema Universitario</h1>
        <p>Seleccione una opción para gestionar los registros.</p>
        {% endblock %}
    </main>

    <footer class="footer">
        <p>&copy; 2026 Sistema de Gestión Universitaria</p>
    </footer>

</body>
</html>
