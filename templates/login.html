{% extends "base.html" %}

{% block content %}
<style>
    .centered-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
        width: 100%;
    }

    .login-card {
        width: 100%;
        max-width: 400px; 
        padding: 30px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background-color: #ffffff;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .login-card h1 {
        text-align: center;
        margin-bottom: 10px;
    }

    .welcome-text {
        text-align: center;
        color: #666;
        margin-bottom: 20px;
    }

    /* Estilo para los botones de selección de Rol */
    .role-selector {
        display: flex;
        gap: 10px;
        margin-bottom: 25px;
    }

    .role-btn {
        flex: 1;
        padding: 10px;
        border: 2px solid #28a745;
        background: transparent;
        color: #28a745;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        transition: all 0.3s;
    }

    .role-btn.active {
        background-color: #28a745;
        color: white;
    }

    .form-group {
        margin-bottom: 15px;
        display: flex;
        flex-direction: column;
    }

    .form-group label {
        margin-bottom: 5px;
        font-weight: 500;
    }

    .form-group input {
        padding: 10px;
        border: 1px solid #777;
        border-radius: 4px;
    }

    .btn-primary {
        margin-top: 15px;
        padding: 12px;
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        width: 100%;
    }
</style>

<div class="centered-container"> 
    <div class="login-card">
        <h1>BIENVENIDO</h1>
        <p class="welcome-text">Seleccione su rol para ingresar</p>

        <div class="role-selector">
            <button type="button" class="role-btn active" id="btn-estudiante" onclick="seleccionarRol('estudiante')">ESTUDIANTE</button>
            <button type="button" class="role-btn" id="btn-admin" onclick="seleccionarRol('administrativo')">ADMINISTRATIVO</button>
        </div>

        <form action="{{ url_for('login') }}" method="post">
            <input type="hidden" name="tipo_usuario" id="tipo_usuario" value="estudiante">

            <div class="form-group">
                <label for="usuario" id="label-usuario">Matrícula</label>
                <input type="text" name="usuario" id="usuario" placeholder="Ej. 100001" required>
            </div>

            <div class="form-group">
                <label for="password" id="label-password">Contraseña (CI)</label>
                <input type="password" name="password" id="password" placeholder="********" required>
                
                <div style="text-align: right; margin-top: 5px;">
                    <a href="{{ url_for('recuperar') }}" style="font-size: 0.85em; color: #ff0000; text-decoration: none;">¿Olvidaste tu contraseña?</a>
                </div>
            </div>

            <button type="submit" class="btn-primary">INGRESAR</button>
        </form>
    </div>
</div>

<script>
function seleccionarRol(rol) {
    // Actualizar valor del campo oculto
    document.getElementById('tipo_usuario').value = rol;

    // Cambiar estados visuales de los botones
    const btnEst = document.getElementById('btn-estudiante');
    const btnAdmin = document.getElementById('btn-admin');
    const lblUser = document.getElementById('label-usuario');
    const inputUser = document.getElementById('usuario');
    const lblPass = document.getElementById('label-password');

    if (rol === 'estudiante') {
        btnEst.classList.add('active');
        btnAdmin.classList.remove('active');
        lblUser.innerText = 'Matrícula';
        inputUser.placeholder = 'Ej. 100001';
        lblPass.innerText = 'Contraseña (CI)';
    } else {
        btnAdmin.classList.add('active');
        btnEst.classList.remove('active');
        lblUser.innerText = 'Nombre de Usuario';
        inputUser.placeholder = 'Ej. admin';
        lblPass.innerText = 'Contraseña';
    }
}
</script>
{% endblock %}
