{% extends "base.html" %}

{% block content %}
<div style="padding: 20px;">
    <div style="background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        
        <div style="background-color: #2a5298; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin: 0; font-size: 1.5em;">Gestión de Usuarios</h2>
            <a href="{{ url_for('nuevo_usuario_admin') }}" style="background: white; color: #2a5298; padding: 8px 15px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 0.9em;">
                + Crear Nuevo Usuario
            </a>
        </div>

        <div style="padding: 20px;">
            <table style="width: 100%; border-collapse: collapse; text-align: left;">
                <thead>
                    <tr style="border-bottom: 2px solid #eee;">
                        <th style="padding: 12px;">ID</th>
                        <th style="padding: 12px;">Username</th>
                        <th style="padding: 12px;">Email</th>
                        <th style="padding: 12px;">Rol</th>
                        <th style="padding: 12px; text-align: center;">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for u in lista_usuarios %}
                    <tr style="border-bottom: 1px solid #eee;">
                        <td style="padding: 12px;">{{ u.id }}</td>
                        <td style="padding: 12px; font-weight: bold;">{{ u.username }}</td>
                        <td style="padding: 12px; color: #555;">{{ u.email }}</td>
                        <td style="padding: 12px;">
                            <span style="background-color: #d1ecf1; color: #0c5460; padding: 4px 10px; border-radius: 15px; font-size: 0.85em; font-weight: bold;">
                                {{ u.rol|upper }}
                            </span>
                        </td>
                        <td style="padding: 12px; text-align: center;">
                            <a href="{{ url_for('editar_usuario', id=u.id) }}" style="color: #f0ad4e; text-decoration: none; font-weight: bold; margin-right: 10px;">Editar</a>
                            <a href="{{ url_for('eliminar_usuario', id=u.id) }}" style="color: #d9534f; text-decoration: none; font-weight: bold;" onclick="return confirm('¿Seguro que deseas eliminarlo?')">Eliminar</a>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="5" style="padding: 20px; text-align: center; color: #888;">No hay usuarios registrados.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
