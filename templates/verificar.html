{% extends "base.html" %}

{% block content %}
<style>
    /* Contenedor para centrar la tarjeta en la pantalla */
    .centered-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 75vh;
        width: 100%;
    }

    .login-card {
        background-color: rgba(255, 255, 255, 0.95);
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        max-width: 450px;
        width: 100%;
        text-align: center;
    }

    .form-group input {
        width: 100%;
        padding: 12px;
        margin: 20px 0;
        border: 1px solid #777;
        border-radius: 8px;
    }

    .btn-primary {
        width: 100%;
        padding: 12px;
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        text-transform: uppercase;
    }

    /* Estilo para los enlaces de abajo */
    .opciones-adicionales {
        margin-top: 25px;
        padding-top: 15px;
        border-top: 1px solid #ddd;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .opciones-adicionales a {
        text-decoration: none;
        font-size: 0.9em;
        font-weight: bold;
        color: #007bff;
    }
</style>

<div class="centered-container">
    <div class="login-card">
        <h1 style="color: #333; margin-bottom: 15px;">VERIFICACIÓN</h1>
        <p style="color: #555;">Introduce el código de 6 dígitos enviado a tu correo.</p>
        
        <form action="{{ url_for('segundo_factor') }}" method="post">
            <div class="form-group">
                <input type="text" name="codigo" maxlength="6" required 
                       style="text-align: center; font-size: 2em; letter-spacing: 10px;" 
                       placeholder="******" autocomplete="off">
            </div>
            <button type="submit" class="btn-primary">ENTRAR</button>
        </form>

        <div class="opciones-adicionales">
            <a href="{{ url_for('reenviar_codigo') }}" style="color: red; font-weight: bold; text-decoration: none;">¿No te llegó el código? Reenviar por error</a>
            <a href="{{ url_for('login') }}">Volver al Login</a>
        </div>
    </div>
</div>
{% endblock %}
