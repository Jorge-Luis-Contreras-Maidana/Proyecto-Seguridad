<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Verificar Recuperación - Sistema U</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; height: 100vh; }
        .card { width: 100%; max-width: 400px; margin: auto; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="card">
    <h3 class="text-center mb-4">Restablecer Clave</h3>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('verificar_recuperacion') }}" method="POST">
        <input type="hidden" name="email" value="{{ email }}">

        <div class="mb-3">
            <label class="form-label">Código de 6 dígitos:</label>
            <input type="text" name="codigo" class="form-control" placeholder="123456" required maxlength="6">
            <div class="form-text">Revisa el código enviado a tu correo.</div>
        </div>

        <div class="mb-3">
            <label class="form-label">Nueva Contraseña:</label>
            <input type="password" name="nueva_password" class="form-control" placeholder="Mínimo 8 caracteres" required>
            <div class="form-text">Debe incluir mayúsculas, minúsculas y un número.</div>
        </div>

        <button type="submit" class="btn btn-primary w-100">Actualizar Contraseña</button>
        
        <div class="text-center mt-3">
            <a href="{{ url_for('login') }}" class="text-decoration-none">Volver al Login</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
